<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-box">
    <h2>Vote</h2>

    <!-- BJP -->
    <div class="vote-option">
        <img src="bjp.png" alt="BJP">
        <button class="btn-custom" onclick="vote('bjp')">BJP</button>
    </div>

    <!-- BRS -->
    <div class="vote-option">
        <img src="brs.png" alt="BRS">
        <button class="btn-custom" onclick="vote('brs')">BRS</button>
    </div>

    <!-- CONGRESS -->
    <div class="vote-option">
        <img src="congress.png" alt="Congress">
        <button class="btn-custom" onclick="vote('congress')">CONGRESS</button>
    </div>

    <!-- View Results -->
    <a href="results.html">
        <button class="btn-custom">View Results</button>
    </a>

</div>

<!-- JS FILE (VERY IMPORTANT) -->
<script src="js/app.js"></script>

</body>
</html>
